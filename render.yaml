services:
  - type: web
    name: maizeguard-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: ./start.sh
    healthCheckPath: /
    envVars:
      - key: CORS_ORIGINS
        value: http://localhost:3000,https://maizeguard-frontend.vercel.app,https://maizeguard-frontend-70xyc87wl-honorine22s-projects.vercel.app
      - key: CONFIDENCE_THRESHOLD
        value: "0.65"
      - key: TOP2_MARGIN_THRESHOLD
        value: "0.15"
      - key: BATCH_INFERENCE_ENABLED
        value: "false"
      - key: TORCH_NUM_THREADS
        value: "1"
